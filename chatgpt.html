<body>

<div id="ui">
<h1>Dodge Game</h1>
<p>Use arrow keys to move. Avoid red squares.</p>
<p>Score: <span id="score">0</span></p>
<p>High Score: <span id="highscore">0</span></p>
<button onclick="restartGame()">Restart</button>
</div>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
    x: 180,
    y: 180,
    size: 20,
    speed: 4
};

let enemies = [];
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highscore").textContent = highScore;

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function spawnEnemy() {
    let size = 20;
    let x = Math.random() * (canvas.width - size);
    let y = -size;
    let speed = 2 + Math.random() * 3;

    enemies.push({x, y, size, speed});
}

function update() {
    // Player movement
    if (keys["ArrowUp"]) player.y -= player.speed;
    if (keys["ArrowDown"]) player.y += player.speed;
    if (keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["ArrowRight"]) player.x += player.speed;

    // Bounds
    player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

    // Enemies
    enemies.forEach(e => e.y += e.speed);

    // Remove off-screen
    enemies = enemies.filter(e => e.y < canvas.height);

    // Collision
    enemies.forEach(e => {
        if (
            player.x < e.x + e.size &&
            player.x + player.size > e.x &&
            player.y < e.y + e.size &&
            player.y + player.size > e.y
        ) {
            gameOver();
        }
    });

    // Score
    score++;
    document.getElementById("score").textContent = score;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Player
    ctx.fillStyle = "#00FFAA";
    ctx.fillRect(player.x, player.y, player.size, player.size);

    // Enemies
    ctx.fillStyle = "#FF4444";
    enemies.forEach(e => {
        ctx.fillRect(e.x, e.y, e.size, e.size);
    });
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
        document.getElementById("highscore").textContent = highScore;
    }

    alert("Game Over! Score: " + score);

    restartGame();
}

function restartGame() {
    player.x = 180;
    player.y = 180;
    enemies = [];
    score = 0;
}

// Spawn loop
setInterval(spawnEnemy, 800);

// Start game
gameLoop();

/* ===== EXTRA LINES FOR LENGTH (DECORATIVE + STRUCTURE) ===== */

// Decorative grid (optional visual effect)
function drawGrid() {
    ctx.strokeStyle = "#111";
    for (let i = 0; i < canvas.width; i += 20) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
    }
    for (let j = 0; j < canvas.height; j += 20) {
        ctx.beginPath();
        ctx.moveTo(0, j);
        ctx.lineTo(canvas.width, j);
        ctx.stroke();
    }
}
