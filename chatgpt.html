<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sprite Dodge Shooter</title>
<style>
body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: monospace;
    text-align: center;
}
canvas {
    background: #000;
    display: block;
    margin: 0 auto;
    border: 2px solid #444;
}

    padding: 10px;
}
button {
    padding: 10px;
    background: #222;
    color: white;
    border: 1px solid #555;
    cursor: pointer;
}
button:hover {
    background: #333;
}
</style>
</head>
<body>

<div id="ui">
<h1>Sprite Shooter</h1>
<p>Move: WASD / Arrows | Shoot: SPACE</p>
<p>Score: <span id="score">0</span></p>
<p>High Score: <span id="highscore">0</span></p>
<button onclick="restartGame()">Restart</button>
</div>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
    x: 180,
    y: 320,
    size: 20,
    speed: 4
};

let enemies = [];
let bullets = [];
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highscore").textContent = highScore;

let keys = {};

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;

    // Shoot on space
    if (e.code === "Space") {
        shoot();
    }
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

// ===== SPRITE DRAWING =====

// Player sprite (pixel ship)
function drawPlayerSprite(x, y) {
    ctx.fillStyle = "#00ffaa";

    // Simple pixel ship
    ctx.fillRect(x + 8, y, 4, 4);
    ctx.fillRect(x + 4, y + 4, 12, 4);
    ctx.fillRect(x, y + 8, 20, 6);
    ctx.fillRect(x + 6, y + 14, 8, 4);
}

// Enemy sprite
function drawEnemySprite(x, y) {
    ctx.fillStyle = "#ff4444";

    ctx.fillRect(x, y, 20, 4);
    ctx.fillRect(x + 4, y + 4, 12, 4);
    ctx.fillRect(x + 8, y + 8, 4, 4);
    ctx.fillRect(x + 4, y + 12, 12, 4);
}

// Bullet sprite
function drawBullet(x, y) {
    ctx.fillStyle = "#ffff00";
    ctx.fillRect(x, y, 4, 10);
}

// ===== GAME LOGIC =====

function spawnEnemy() {
    let size = 20;
    let x = Math.random() * (canvas.width - size);
    let y = -size;
    let speed = 2 + Math.random() * 2;

    enemies.push({x, y, size, speed});
}

function shoot() {
    bullets.push({
        x: player.x + player.size / 2 - 2,
        y: player.y,
        speed: 6
    });
}

function update() {
    // Movement (WASD + Arrows)
    if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
    if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
    if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
    if (keys["d"] || keys["arrowright"]) player.x += player.speed;

    // Clamp
    player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

    // Move enemies
    enemies.forEach(e => e.y += e.speed);

    // Move bullets
    bullets.forEach(b => b.y -= b.speed);

    // Remove offscreen
    enemies = enemies.filter(e => e.y < canvas.height);
    bullets = bullets.filter(b => b.y > 0);

    // Bullet collision
    enemies.forEach((e, ei) => {
        bullets.forEach((b, bi) => {
            if (
                b.x < e.x + e.size &&
                b.x + 4 > e.x &&
                b.y < e.y + e.size &&
                b.y + 10 > e.y
            ) {
                enemies.splice(ei, 1);
                bullets.splice(bi, 1);
                score += 50;
            }
        });
    });

    // Player collision
    enemies.forEach(e => {
        if (
            player.x < e.x + e.size &&
            player.x + player.size > e.x &&
            player.y < e.y + e.size &&
            player.y + player.size > e.y
        ) {
            gameOver();
        }
    });

    // Score over time
    score++;
    document.getElementById("score").textContent = score;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawPlayerSprite(player.x, player.y);

    enemies.forEach(e => drawEnemySprite(e.x, e.y));

    bullets.forEach(b => drawBullet(b.x, b.y));
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
        document.getElementById("highscore").textContent = highScore;
    }

    alert("Game Over! Score: " + score);
    restartGame();
}

function restartGame() {
    player.x = 180;
    player.y = 320;
    enemies = [];
    bullets = [];
    score = 0;
}

// Spawn loop
setInterval(spawnEnemy, 700);

// Start
gameLoop();
