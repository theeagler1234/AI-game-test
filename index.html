<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My HTML Games</title>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #0d1117;
        color: #e6edf3;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    header {
        padding: 40px 20px 20px;
        text-align: center;
    }

    h1 {
        margin: 0;
        font-size: 2.6rem;
        font-weight: 700;
        color: #58a6ff;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        width: 90%;
        max-width: 900px;
        padding-bottom: 40px;
    }

    .card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 10px;
        padding: 20px;
        text-align: center;
        transition: transform 0.2s, border-color 0.2s;
    }

    .card:hover {
        transform: translateY(-5px);
        border-color: #58a6ff;
    }

    a {
        text-decoration: none;
        color: #58a6ff;
        font-size: 1.2rem;
        font-weight: bold;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>
<header>
    <h1>My HTML Games</h1>
</header>

<div class="grid">
    <div class="card">
        <a href="bulletheck.html">Bullet Heck</a>
    </div>

    <div class="card">
        <a href="bulletheck2.html">Bullet Heck 2</a>
    </div>

    <div class="card">
        <a href="flappybi-square.html">Flappybi Square</a>
    </div>

    <div class="card">
        <a href="snake.html">Snake</a>
    </div>

    <div class="card">
        <a href="space%20invaders!.html">Space Invaders!</a>
    </div>
</div>

</body>
</html>
