<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flappy Square - HTML5 Canvas Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* Basic page reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111827;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Container to center the canvas and UI */
    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
    }

    canvas {
      background: #020617;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      max-width: 100vw;
      max-height: 80vh;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #022c22;
      box-shadow: 0 8px 18px rgba(34, 197, 94, 0.4);
      transition: transform 0.1s ease, box-shadow 0.1s ease,
        filter 0.1s ease;
    }

    .btn:hover {
      filter: brightness(1.05);
      box-shadow: 0 10px 22px rgba(34, 197, 94, 0.5);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);
    }

    .score-label {
      font-size: 16px;
      font-weight: 500;
      color: #9ca3af;
    }

    .score-value {
      font-size: 24px;
      font-weight: 700;
      color: #facc15;
    }

    @media (max-width: 600px) {
      .score-label {
        font-size: 14px;
      }
      .score-value {
        font-size: 20px;
      }
      .btn {
        font-size: 12px;
        padding: 7px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div>
      <span class="score-label">Score:</span>
      <span id="scoreDisplay" class="score-value">0</span>
    </div>
    <button id="startButton" class="btn">Start</button>
  </div>

  <script>
    // ====== BASIC SETUP ======
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const startButton = document.getElementById("startButton");
    const scoreDisplay = document.getElementById("scoreDisplay");

    // Internal "virtual" resolution; canvas will scale to fit
    const BASE_WIDTH = 400;
    const BASE_HEIGHT = 600;

    // ====== TUNABLE GAME VARIABLES ======
    // You can tweak these values to adjust difficulty and feel.

    let gravity = 0.35; // How fast the player accelerates downward
    let jumpStrength = -7.5; // How strong the jump is (more negative = higher jump)
    let pipeSpeed = -2.5; // Horizontal speed of pipes (more negative = faster)
    let pipeGap = 150; // Vertical gap between top and bottom pipes
    let pipeInterval = 1400; // Time (ms) between pipe spawns

    // ====== GAME STATE ======
    let gameState = "start"; // "start" | "playing" | "gameover"
    let lastTime = 0;
    let spawnTimer = 0;
    let score = 0;

    // Player object
    const player = {
      x: 80,
      y: BASE_HEIGHT / 2,
      width: 28,
      height: 28,
      vy: 0,
    };

    // Pipes array
    const pipes = [];

    // ====== RESPONSIVE CANVAS ======
    function resizeCanvas() {
      // Keep aspect ratio based on BASE_WIDTH x BASE_HEIGHT
      const maxWidth = Math.min(window.innerWidth * 0.95, 500);
      const scale = maxWidth / BASE_WIDTH;
      canvas.width = BASE_WIDTH;
      canvas.height = BASE_HEIGHT;
      canvas.style.width = BASE_WIDTH * scale + "px";
      canvas.style.height = BASE_HEIGHT * scale + "px";
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    // ====== INPUT HANDLING ======
    function handleJump() {
      if (gameState === "start") {
        startGame();
      } else if (gameState === "playing") {
        player.vy = jumpStrength;
      } else if (gameState === "gameover") {
        restartGame();
      }
    }

    // Mouse / touch on canvas
    canvas.addEventListener("mousedown", handleJump);
    canvas.addEventListener("touchstart", function (e) {
      e.preventDefault();
      handleJump();
    });

    // Keyboard
    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        handleJump();
      }
    });

    // Start / Restart button
    startButton.addEventListener("click", () => {
      if (gameState === "start") {
        startGame();
      } else if (gameState === "gameover") {
        restartGame();
      }
    });

    // ====== GAME CONTROL FUNCTIONS ======
    function resetPlayer() {
      player.x = 80;
      player.y = BASE_HEIGHT / 2;
      player.vy = 0;
    }

    function resetPipes() {
      pipes.length = 0;
      spawnTimer = 0;
    }

    function startGame() {
      gameState = "playing";
      score = 0;
      scoreDisplay.textContent = score;
      resetPlayer();
      resetPipes();
      startButton.textContent = "Tap / Click / Space to Jump";
    }

    function gameOver() {
      gameState = "gameover";
      startButton.textContent = "Restart";
    }

    function restartGame() {
      gameState = "start";
      score = 0;
      scoreDisplay.textContent = score;
      resetPlayer();
      resetPipes();
      startButton.textContent = "Start";
    }

    // ====== PIPE MANAGEMENT ======
    function spawnPipe() {
      // Random top pipe height
      const minPipeHeight = 40;
      const maxPipeHeight = BASE_HEIGHT - pipeGap - 80;
      const topHeight =
        Math.random() * (maxPipeHeight - minPipeHeight) + minPipeHeight;

      const bottomY = topHeight + pipeGap;
      const bottomHeight = BASE_HEIGHT - bottomY;

      const pipe = {
        x: BASE_WIDTH + 40,
        width: 60,
        topHeight,
        bottomY,
        bottomHeight,
        passed: false, // to count score once
      };

      pipes.push(pipe);
    }

    // ====== COLLISION CHECK ======
    function rectIntersect(ax, ay, aw, ah, bx, by, bw, bh) {
      return (
        ax < bx + bw &&
        ax + aw > bx &&
        ay < by + bh &&
        ay + ah > by
      );
    }

    function checkCollisions() {
      // Ground / ceiling
      if (player.y + player.height > BASE_HEIGHT || player.y < 0) {
        gameOver();
        return;
      }

      // Pipes
      for (const pipe of pipes) {
        // Top pipe
        if (
          rectIntersect(
            player.x,
            player.y,
            player.width,
            player.height,
            pipe.x,
            0,
            pipe.width,
            pipe.topHeight
          )
        ) {
          gameOver();
          return;
        }

        // Bottom pipe
        if (
          rectIntersect(
            player.x,
            player.y,
            player.width,
            player.height,
            pipe.x,
            pipe.bottomY,
            pipe.width,
            pipe.bottomHeight
          )
        ) {
          gameOver();
          return;
        }
      }
    }

    // ====== UPDATE LOOP ======
    function update(delta) {
      if (gameState !== "playing") return;

      // Apply gravity to player
      player.vy += gravity;
      player.y += player.vy;

      // Move pipes
      for (const pipe of pipes) {
        pipe.x += pipeSpeed;
      }

      // Remove off-screen pipes
      for (let i = pipes.length - 1; i >= 0; i--) {
        if (pipes[i].x + pipes[i].width < 0) {
          pipes.splice(i, 1);
        }
      }

      // Spawn new pipes
      spawnTimer += delta;
      if (spawnTimer > pipeInterval) {
        spawnPipe();
        spawnTimer = 0;
      }

      // Score when passing pipes
      for (const pipe of pipes) {
        if (!pipe.passed && pipe.x + pipe.width < player.x) {
          pipe.passed = true;
          score++;
          scoreDisplay.textContent = score;
        }
      }

      // Check collisions
      checkCollisions();
    }

    // ====== DRAWING ======
    function drawBackground() {
      // Gradient sky
      const grad = ctx.createLinearGradient(0, 0, 0, BASE_HEIGHT);
      grad.addColorStop(0, "#0f172a");
      grad.addColorStop(1, "#020617");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

      // Ground line
      ctx.strokeStyle = "#1f2937";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, BASE_HEIGHT - 2);
      ctx.lineTo(BASE_WIDTH, BASE_HEIGHT - 2);
      ctx.stroke();
    }

    function drawPlayer() {
      // Player body
      ctx.fillStyle = "#22c55e";
      ctx.beginPath();
      ctx.roundRect(
        player.x,
        player.y,
        player.width,
        player.height,
        6
      );
      ctx.fill();

      // Eye
      ctx.fillStyle = "#022c22";
      ctx.beginPath();
      ctx.arc(
        player.x + player.width * 0.7,
        player.y + player.height * 0.35,
        3,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function drawPipes() {
      for (const pipe of pipes) {
        // Pipe color
        ctx.fillStyle = "#16a34a";

        // Top pipe
        ctx.fillRect( pipe.x, 0, pipe.width, pipe.topHeight );

        // Bottom pipe
        ctx.fillRect(
          pipe.x,
          pipe.bottomY,
          pipe.width,
          pipe.bottomHeight
        );

        // Pipe edges
        ctx.strokeStyle = "#065f46";
        ctx.lineWidth = 3;
        ctx.strokeRect(pipe.x, 0, pipe.width, pipe.topHeight);
        ctx.strokeRect(
          pipe.x,
          pipe.bottomY,
          pipe.width,
          pipe.bottomHeight
        );
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = "rgba(15,23,42,0.75)";
      ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

      ctx.fillStyle = "#e5e7eb";
      ctx.textAlign = "center";

      ctx.font = "32px system-ui";
      ctx.fillText("Flappy Square", BASE_WIDTH / 2, BASE_HEIGHT / 2 - 40);

      ctx.font = "16px system-ui";
      ctx.fillStyle = "#9ca3af";
      ctx.fillText(
        "Tap / Click / Space to jump",
        BASE_WIDTH / 2,
        BASE_HEIGHT / 2
      );
      ctx.fillText(
        "Avoid the pipes and stay in the air!",
        BASE_WIDTH / 2,
        BASE_HEIGHT / 2 + 24
      );
    }

    function drawGameOverScreen() {
      ctx.fillStyle = "rgba(15,23,42,0.8)";
      ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

      ctx.fillStyle = "#f97316";
      ctx.textAlign = "center";
      ctx.font = "32px system-ui";
      ctx.fillText("Game Over", BASE_WIDTH / 2, BASE_HEIGHT / 2 - 40);

      ctx.fillStyle = "#e5e7eb";
      ctx.font = "18px system-ui";
      ctx.fillText(
        `Score: ${score}`,
        BASE_WIDTH / 2,
        BASE_HEIGHT / 2
      );

      ctx.font = "14px system-ui";
      ctx.fillStyle = "#9ca3af";
      ctx.fillText(
        "Click / Tap / Press Space or the button to restart",
        BASE_WIDTH / 2,
        BASE_HEIGHT / 2 + 30
      );
    }

    function drawHUD() {
      ctx.textAlign = "left";
      ctx.font = "16px system-ui";
      ctx.fillStyle = "#facc15";
      ctx.fillText(`Score: ${score}`, 16, 30);
    }

    // ====== MAIN LOOP ======
    function loop(timestamp) {
      const delta = timestamp - lastTime;
      lastTime = timestamp;

      drawBackground();
      drawPipes();
      drawPlayer();
      drawHUD();

      if (gameState === "start") {
        drawStartScreen();
      } else if (gameState === "gameover") {
        drawGameOverScreen();
      } else if (gameState === "playing") {
        update(delta);
      }

      requestAnimationFrame(loop);
    }

    // Start the animation loop
    requestAnimationFrame(loop);
  </script>
</body>
</html>
