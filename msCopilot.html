<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Bullet Hell Waves</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #111 0, #000 60%);
    color: #fff;
    font-family: system-ui, sans-serif;
    overflow: hidden;
    touch-action: none;
  }
  #ui {
    position: absolute;
    top: 8px;
    left: 8px;
    z-index: 10;
    font-size: 14px;
    text-shadow: 0 0 4px #000;
  }
  #ui div { margin-bottom: 4px; }

  #centerMessage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-size: 24px;
    text-shadow: 0 0 8px #000;
    pointer-events: none;
  }

  #controls {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  .btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid #0ff;
    background: radial-gradient(circle at 30% 30%, #0ff, #006);
    opacity: 0.7;
    touch-action: none;
  }
  .btn:active {
    opacity: 1;
    border-color: #fff;
  }

  #upgradePanel {
    position: absolute;
    right: 8px;
    top: 8px;
    background: rgba(0,0,0,0.6);
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 12px;
    max-width: 180px;
  }
  #upgradePanel h3 {
    margin: 0 0 4px 0;
    font-size: 13px;
    text-align: center;
  }
  #upgradePanel button {
    width: 100%;
    margin: 2px 0;
    font-size: 11px;
    border-radius: 4px;
    border: 1px solid #0f0;
    background: #020;
    color: #9f9;
    cursor: pointer;
  }
  #upgradePanel button:disabled {
    opacity: 0.4;
    cursor: default;
  }

  canvas {
    display: block;
  }
</style>
</head>
<body>
<div id="ui">
  <div>Score: <span id="score">0</span></div>
  <div>High Score: <span id="highScore">0</span></div>
  <div>Wave: <span id="wave">1</span></div>
  <div>HP: <span id="hp">5</span></div>
</div>

<div id="centerMessage"></div>

<div id="upgradePanel">
  <h3>Upgrades</h3>
  <div>Points: <span id="upgradePoints">0</span></div>
  <button id="fireRateBtn">Fire Rate + (Cost 2)</button>
  <button id="speedBtn">Move Speed + (Cost 2)</button>
  <button id="multiShotBtn">Multi Shot + (Cost 3)</button>
</div>

<div id="controls">
  <button class="btn" id="leftBtn"></button>
  <button class="btn" id="rightBtn"></button>
  <button class="btn" id="shootBtn"></button>
</div>

<canvas id="game"></canvas>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  let W = window.innerWidth;
  let H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;

  window.addEventListener('resize', () => {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
  });

  const scoreEl = document.getElementById('score');
  const highScoreEl = document.getElementById('highScore');
  const waveEl = document.getElementById('wave');
  const hpEl = document.getElementById('hp');
  const centerMessage = document.getElementById('centerMessage');
  const upgradePointsEl = document.getElementById('upgradePoints');

  const fireRateBtn = document.getElementById('fireRateBtn');
  const speedBtn = document.getElementById('speedBtn');
  const multiShotBtn = document.getElementById('multiShotBtn');

  const leftBtn = document.getElementById('leftBtn');
  const rightBtn = document.getElementById('rightBtn');
  const shootBtn = document.getElementById('shootBtn');

  let highScore = parseInt(localStorage.getItem('bh_highscore') || '0', 10);
  highScoreEl.textContent = highScore;

  // Input
  const keys = { left: false, right: false, shoot: false };
  document.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
    if (e.code === 'Space') keys.shoot = true;
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    if (e.code === 'Space') keys.shoot = false;
  });

  function bindTouch(btn, prop) {
    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      keys[prop] = true;
    }, { passive: false });
    btn.addEventListener('touchend', e => {
      e.preventDefault();
      keys[prop] = false;
    }, { passive: false });
    btn.addEventListener('touchcancel', e => {
      e.preventDefault();
      keys[prop] = false;
    }, { passive: false });
  }
  bindTouch(leftBtn, 'left');
  bindTouch(rightBtn, 'right');
  bindTouch(shootBtn, 'shoot');

  // Game state
  let player = {
    x: W / 2,
    y: H - 80,
    radius: 18,
    speed: 5,
    hp: 5,
    fireCooldown: 0,
    baseFireDelay: 14,
    multiShot: 1
  };

  let bullets = [];
  let enemyBullets = [];
  let enemies = [];
  let particles = [];

  let score = 0;
  let wave = 1;
  let waveTimer = 0;
  let inWave = false;
  let bossActive = false;
  let upgradePoints = 0;

  function resetGame() {
    player.x = W / 2;
    player.y = H - 80;
    player.hp = 5;
    player.speed = 5;
    player.baseFireDelay = 14;
    player.multiShot = 1;
    bullets = [];
    enemyBullets = [];
    enemies = [];
    particles = [];
    score = 0;
    wave = 1;
    inWave = false;
    bossActive = false;
    waveTimer = 0;
    upgradePoints = 0;
    updateUI();
    showMessage('Bullet Hell Waves<br>Move: A/D or ◀▶<br>Shoot: Space or right button', 2000);
  }

  function updateUI() {
    scoreEl.textContent = score;
    waveEl.textContent = wave;
    hpEl.textContent = player.hp;
    upgradePointsEl.textContent = upgradePoints;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('bh_highscore', highScore);
      highScoreEl.textContent = highScore;
    }
  }

  function showMessage(text, duration = 1000) {
    centerMessage.innerHTML = text;
    if (duration > 0) {
      setTimeout(() => {
        if (centerMessage.innerHTML === text) centerMessage.innerHTML = '';
      }, duration);
    }
  }

  // Upgrades
  function canAfford(cost) {
    return upgradePoints >= cost;
  }

  fireRateBtn.onclick = () => {
    const cost = 2;
    if (!canAfford(cost)) return;
    upgradePoints -= cost;
    player.baseFireDelay = Math.max(4, player.baseFireDelay - 2);
    updateUI();
  };

  speedBtn.onclick = () => {
    const cost = 2;
    if (!canAfford(cost)) return;
    upgradePoints -= cost;
    player.speed += 0.8;
    updateUI();
  };

  multiShotBtn.onclick = () => {
    const cost = 3;
    if (!canAfford(cost)) return;
    upgradePoints -= cost;
    player.multiShot = Math.min(5, player.multiShot + 1);
    updateUI();
  };

  // Entities
  function spawnWave() {
    inWave = true;
    bossActive = false;
    enemies = [];
    enemyBullets = [];
    bullets = [];
    particles = [];

    const isBossWave = wave % 5 === 0;
    if (isBossWave) {
      bossActive = true;
      const boss = {
        x: W / 2,
        y: 120,
        radius: 40,
        hp: 60 + wave * 8,
        maxHp: 60 + wave * 8,
        type: 'boss',
        fireTimer: 0,
        moveDir: 1
      };
      enemies.push(boss);
      showMessage('Boss Wave!', 1500);
    } else {
      const rows = 2 + Math.floor(wave / 2);
      const cols = 6;
      const marginX = 80;
      const marginY = 80;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const x = marginX + c * ((W - marginX * 2) / (cols - 1));
          const y = marginY + r * 50;
          enemies.push({
            x,
            y,
            radius: 16,
            hp: 3 + Math.floor(wave / 2),
            type: 'normal',
            fireTimer: Math.random() * 60
          });
        }
      }
      showMessage('Wave ' + wave, 1000);
    }
  }

  function spawnParticles(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 3 + 1;
      particles.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 30,
        color
      });
    }
  }

  function shootPlayer() {
    if (player.fireCooldown > 0) return;
    player.fireCooldown = player.baseFireDelay;
    const spread = 0.25;
    const count = player.multiShot;
    const baseAngle = -Math.PI / 2;
    for (let i = 0; i < count; i++) {
      const t = count === 1 ? 0 : (i / (count - 1) - 0.5);
      const angle = baseAngle + t * spread;
      bullets.push({
        x: player.x,
        y: player.y - player.radius,
        vx: Math.cos(angle) * 8,
        vy: Math.sin(angle) * 8,
        radius: 4,
        color: '#0ff'
      });
    }
  }

  function enemyShoot(enemy) {
    if (enemy.type === 'boss') {
      const patterns = 3;
      const pattern = wave % patterns;
      if (pattern === 0) {
        // radial
        const count = 18;
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 * i) / count;
          enemyBullets.push({
            x: enemy.x,
            y: enemy.y,
            vx: Math.cos(angle) * 3,
            vy: Math.sin(angle) * 3,
            radius: 4,
            color: '#f55'
          });
        }
      } else if (pattern === 1) {
        // aimed spread
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const baseAngle = Math.atan2(dy, dx);
        const spread = 0.4;
        for (let i = -2; i <= 2; i++) {
          const angle = baseAngle + i * spread / 2;
          enemyBullets.push({
            x: enemy.x,
            y: enemy.y,
            vx: Math.cos(angle) * 4,
            vy: Math.sin(angle) * 4,
            radius: 4,
            color: '#fdd'
          });
        }
      } else {
        // sweeping arc
        const count = 14;
        const base = performance.now() / 600;
        for (let i = 0; i < count; i++) {
          const angle = base + (Math.PI * i) / (count - 1);
          enemyBullets.push({
            x: enemy.x,
            y: enemy.y,
            vx: Math.cos(angle) * 3.5,
            vy: Math.sin(angle) * 3.5,
            radius: 4,
            color: '#ff0'
          });
        }
      }
    } else {
      const dx = player.x - enemy.x;
      const dy = player.y - enemy.y;
      const angle = Math.atan2(dy, dx);
      enemyBullets.push({
        x: enemy.x,
        y: enemy.y,
        vx: Math.cos(angle) * 3.5,
        vy: Math.sin(angle) * 3.5,
        radius: 3,
        color: '#f55'
      });
    }
  }

  function circleCollide(a, b) {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    const r = a.radius + b.radius;
    return dx * dx + dy * dy <= r * r;
  }

  // Drawing
  function drawPlayer() {
    const { x, y, radius } = player;
    ctx.save();
    ctx.translate(x, y);

    // glowing aura
    const grad = ctx.createRadialGradient(0, 0, radius * 0.2, 0, 0, radius * 1.4);
    grad.addColorStop(0, 'rgba(0,255,255,0.9)');
    grad.addColorStop(1, 'rgba(0,50,80,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, radius * 1.4, 0, Math.PI * 2);
    ctx.fill();

    // main ship (triangle)
    ctx.rotate(-Math.PI / 2);
    ctx.beginPath();
    ctx.moveTo(radius, 0);
    ctx.lineTo(-radius * 0.7, radius * 0.8);
    ctx.lineTo(-radius * 0.7, -radius * 0.8);
    ctx.closePath();
    ctx.fillStyle = '#0ff';
    ctx.fill();

    // cockpit
    ctx.beginPath();
    ctx.arc(radius * 0.1, 0, radius * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.8;
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.type === 'boss') {
      // boss: stylized hexagon with core
      const r = e.radius;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI * 2 * i) / 6 + performance.now() / 2000;
        const rr = r * (0.9 + 0.1 * Math.sin(performance.now() / 500 + i));
        const x = Math.cos(angle) * rr;
        const y = Math.sin(angle) * rr;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      const grad = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r);
      grad.addColorStop(0, '#fdf');
      grad.addColorStop(1, '#606');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#f0f';
      ctx.stroke();

      // core
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = '#ff0';
      ctx.fill();

      // hp bar
      const hpRatio = e.hp / e.maxHp;
      ctx.restore();
      const barW = 120;
      const barH = 8;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(e.x - barW / 2, e.y - e.radius - 20, barW, barH);
      ctx.fillStyle = '#f00';
      ctx.fillRect(e.x - barW / 2, e.y - e.radius - 20, barW * hpRatio, barH);
    } else {
      // normal enemy: diamond with wings
      const r = e.radius;
      ctx.rotate(Math.sin(performance.now() / 400 + e.x * 0.01) * 0.2);
      ctx.beginPath();
      ctx.moveTo(0, -r);
      ctx.lineTo(r * 0.8, 0);
      ctx.lineTo(0, r);
      ctx.lineTo(-r * 0.8, 0);
      ctx.closePath();
      ctx.fillStyle = '#f55';
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#faa';
      ctx.stroke();

      // wings
      ctx.beginPath();
      ctx.moveTo(-r * 0.8, 0);
      ctx.lineTo(-r * 1.4, -r * 0.6);
      ctx.lineTo(-r * 1.4, r * 0.6);
      ctx.closePath();
      ctx.fillStyle = '#933';
      ctx.fill();
      ctx.restore();
    }
  }

  function drawBullet(b) {
    ctx.save();
    ctx.translate(b.x, b.y);
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, b.radius * 2);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(1, b.color);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, b.radius * 1.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawParticle(p) {
    ctx.save();
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Game loop
  let lastTime = 0;
  function loop(t) {
    requestAnimationFrame(loop);
    const dt = (t - lastTime) / 16.67;
    lastTime = t;

    ctx.clearRect(0, 0, W, H);

    // background stars
    ctx.save();
    ctx.fillStyle = '#020';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#0a0';
    for (let i = 0; i < 60; i++) {
      const y = (t * 0.05 + i * 40) % H;
      const x = (i * 73) % W;
      ctx.fillRect(x, y, 2, 2);
    }
    ctx.restore();

    if (!inWave) {
      waveTimer += dt;
      if (waveTimer > 60) {
        waveTimer = 0;
        spawnWave();
      }
    }

    // Player movement
    if (keys.left) player.x -= player.speed * dt;
    if (keys.right) player.x += player.speed * dt;
    player.x = Math.max(player.radius + 10, Math.min(W - player.radius - 10, player.x));

    if (keys.shoot) shootPlayer();
    if (player.fireCooldown > 0) player.fireCooldown -= dt;

    // Update bullets
    bullets.forEach(b => {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
    });
    bullets = bullets.filter(b => b.y > -40 && b.y < H + 40 && b.x > -40 && b.x < W + 40);

    enemyBullets.forEach(b => {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
    });
    enemyBullets = enemyBullets.filter(b => b.y > -40 && b.y < H + 40 && b.x > -40 && b.x < W + 40);

    // Update enemies
    enemies.forEach(e => {
      if (e.type === 'boss') {
        e.x += e.moveDir * 2 * dt;
        if (e.x < e.radius + 40) e.moveDir = 1;
        if (e.x > W - e.radius - 40) e.moveDir = -1;
        e.fireTimer -= dt;
        if (e.fireTimer <= 0) {
          enemyShoot(e);
          e.fireTimer = 40 - Math.min(25, wave * 1.2);
        }
      } else {
        e.y += 0.2 * dt;
        e.fireTimer -= dt;
        if (e.fireTimer <= 0) {
          enemyShoot(e);
          e.fireTimer = 80 - Math.min(40, wave * 2);
        }
      }
    });

    // Collisions: player bullets vs enemies
    bullets.forEach(b => {
      enemies.forEach(e => {
        if (e.hp > 0 && circleCollide(b, e)) {
          e.hp -= 1;
          b.dead = true;
          spawnParticles(b.x, b.y, '#0ff', 4);
          if (e.hp <= 0) {
            e.dead = true;
            const baseScore = e.type === 'boss' ? 500 : 50;
            score += baseScore + wave * 10;
            upgradePoints += e.type === 'boss' ? 5 : 1;
            spawnParticles(e.x, e.y, e.type === 'boss' ? '#f0f' : '#f55', e.type === 'boss' ? 40 : 15);
          }
        }
      });
    });
    bullets = bullets.filter(b => !b.dead);
    enemies = enemies.filter(e => !e.dead);

    // Collisions: enemy bullets vs player
    enemyBullets.forEach(b => {
      if (circleCollide(b, player)) {
        b.dead = true;
        player.hp -= 1;
        spawnParticles(player.x, player.y, '#ff0', 12);
        if (player.hp <= 0) {
          showMessage('Game Over<br>Score: ' + score + '<br>Tap or press any key to restart', 0);
          inWave = false;
          enemies = [];
          enemyBullets = [];
          bullets = [];
          particles = [];
          document.onkeydown = () => {
            document.onkeydown = null;
            resetGame();
          };
          canvas.onclick = () => {
            canvas.onclick = null;
            resetGame();
          };
        }
      }
    });
    enemyBullets = enemyBullets.filter(b => !b.dead);

    // Collisions: enemies vs player (touch)
    enemies.forEach(e => {
      if (circleCollide(e, player)) {
        e.dead = true;
        player.hp -= 2;
        spawnParticles(player.x, player.y, '#ff0', 16);
      }
    });
    enemies = enemies.filter(e => !e.dead);

    // Wave completion
    if (inWave && enemies.length === 0 && player.hp > 0) {
      inWave = false;
      wave += 1;
      showMessage('Wave cleared!', 1000);
    }

    // Update particles
    particles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
    });
    particles = particles.filter(p => p.life > 0);

    // Draw
    particles.forEach(drawParticle);
    enemies.forEach(drawEnemy);
    bullets.forEach(drawBullet);
    enemyBullets.forEach(drawBullet);
    if (player.hp > 0) drawPlayer();

    updateUI();
  }

  resetGame();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
