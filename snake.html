<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        color: white;
    }

    #gameContainer {
        text-align: center;
    }

    canvas {
        background: #000;
        border: 2px solid #444;
        max-width: 90vw;
        max-height: 90vh;
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        background: #28a745;
        color: white;
        border-radius: 5px;
    }

    button:hover {
        background: #218838;
    }
</style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div>
        <button id="startBtn">Start Game</button>
        <button id="restartBtn" style="display:none;">Restart</button>
    </div>
    <p id="scoreText">Score: 0</p>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");
const scoreText = document.getElementById("scoreText");

// === GAME SETTINGS (adjust these easily) ===
const gridSize = 20;        // Size of each cell
let speed = 120;           // Lower = faster snake

let snake, direction, food, score, gameInterval, running;

// Initialize game state
function initGame() {
    snake = [{ x: 10, y: 10 }];
    direction = { x: 1, y: 0 };
    food = spawnFood();
    score = 0;
    running = true;

    scoreText.textContent = "Score: " + score;
    restartBtn.style.display = "none";
}

// Spawn food at random position
function spawnFood() {
    return {
        x: Math.floor(Math.random() * (canvas.width / gridSize)),
        y: Math.floor(Math.random() * (canvas.height / gridSize))
    };
}

// Main game loop
function gameLoop() {
    if (!running) return;

    update();
    draw();
}

// Update game state
function update() {
    const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
    };

    // Wall collision
    if (
        head.x < 0 || head.y < 0 ||
        head.x >= canvas.width / gridSize ||
        head.y >= canvas.height / gridSize
    ) {
        gameOver();
        return;
    }

    // Self collision
    for (let part of snake) {
        if (part.x === head.x && part.y === head.y) {
            gameOver();
            return;
        }
    }

    snake.unshift(head);

    // Food collision
    if (head.x === food.x && head.y === food.y) {
        score++;
        scoreText.textContent = "Score: " + score;
        food = spawnFood();

        // Optional: increase speed slightly
        speed = Math.max(60, speed - 2);
        clearInterval(gameInterval);
        gameInterval = setInterval(gameLoop, speed);
    } else {
        snake.pop();
    }
}

// Draw everything
function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw snake
    ctx.fillStyle = "#0f0";
    for (let part of snake) {
        ctx.fillRect(
            part.x * gridSize,
            part.y * gridSize,
            gridSize - 2,
            gridSize - 2
        );
    }

    // Draw food
    ctx.fillStyle = "#f00";
    ctx.fillRect(
        food.x * gridSize,
        food.y * gridSize,
        gridSize - 2,
        gridSize - 2
    );
}

// Game over state
function gameOver() {
    running = false;
    clearInterval(gameInterval);

    ctx.fillStyle = "white";
    ctx.font = "24px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2);

    restartBtn.style.display = "inline-block";
}

// Controls (keyboard)
document.addEventListener("keydown", e => {
    if (!running) return;

    switch (e.key) {
        case "ArrowUp":
            if (direction.y !== 1) direction = { x: 0, y: -1 };
            break;
        case "ArrowDown":
            if (direction.y !== -1) direction = { x: 0, y: 1 };
            break;
        case "ArrowLeft":
            if (direction.x !== 1) direction = { x: -1, y: 0 };
            break;
        case "ArrowRight":
            if (direction.x !== -1) direction = { x: 1, y: 0 };
            break;
    }
});

// Touch controls for mobile
canvas.addEventListener("touchstart", handleTouch);
canvas.addEventListener("touchmove", handleTouch);

let touchStartX = 0;
let touchStartY = 0;

function handleTouch(e) {
    e.preventDefault();

    const touch = e.touches[0];

    if (e.type === "touchstart") {
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
    } else {
        let dx = touch.clientX - touchStartX;
        let dy = touch.clientY - touchStartY;

        if (Math.abs(dx) > Math.abs(dy)) {
            direction = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
        } else {
            direction = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
        }
    }
}

// Start button
startBtn.onclick = () => {
    initGame();
    clearInterval(gameInterval);
    gameInterval = setInterval(gameLoop, speed);
};

// Restart button
restartBtn.onclick = () => {
    speed = 120; // Reset speed
    initGame();
    gameInterval = setInterval(gameLoop, speed);
};
</script>

</body>
</html>
