<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fixed Sprite Shooter</title>
<style>
body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: monospace;
    text-align: center;
}
canvas {
    background: #000;
    display: block;
    margin: 0 auto;
    border: 2px solid #444;
}
#ui {
    padding: 10px;
}
button {
    padding: 10px;
    background: #222;
    color: white;
    border: 1px solid #555;
    cursor: pointer;
}
button:hover {
    background: #333;
}
</style>
</head>
<body>

<div id="ui">
<h1>Fixed Sprite Shooter</h1>
<p>Move: WASD / Arrows | Shoot: SPACE</p>
<p>Score: <span id="score">0</span></p>
<p>High Score: <span id="highscore">0</span></p>
<button onclick="restartGame()">Restart</button>
</div>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ===== STATE =====
let player = { x: 180, y: 320, size: 20, speed: 4 };
let enemies = [];
let bullets = [];
let keys = {};
let score = 0;
let shootCooldown = 0;

let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highscore").textContent = highScore;

// ===== INPUT =====
document.addEventListener("keydown", (e) => {
    keys[e.key.toLowerCase()] = true;

    // prevent scroll
    if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(e.key.toLowerCase())) {
        e.preventDefault();
    }
});

document.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});

// ===== SPRITES (PIXEL ART) =====
function drawPlayer(x, y) {
    const p = [
        "00100",
        "01110",
        "11111",
        "10101",
        "00100"
    ];
    drawPixelArt(p, x, y, "#00ffaa");
}

function drawEnemy(x, y) {
    const p = [
        "11111",
        "10101",
        "11111",
        "01110",
        "01010"
    ];
    drawPixelArt(p, x, y, "#ff4444");
}

function drawPixelArt(pattern, x, y, color) {
    const size = 4;
    ctx.fillStyle = color;
    for (let row = 0; row < pattern.length; row++) {
        for (let col = 0; col < pattern[row].length; col++) {
            if (pattern[row][col] === "1") {
                ctx.fillRect(x + col * size, y + row * size, size, size);
            }
        }
    }
}

// ===== GAME LOGIC =====
function spawnEnemy() {
    enemies.push({
        x: Math.random() * 360,
        y: -20,
        size: 20,
        speed: 2 + Math.random() * 2
    });
}

function shoot() {
    bullets.push({
        x: player.x + 8,
        y: player.y,
        speed: 7
    });
}

function update() {
    // Movement
    if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
    if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
    if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
    if (keys["d"] || keys["arrowright"]) player.x += player.speed;

    // Clamp
    player.x = Math.max(0, Math.min(380, player.x));
    player.y = Math.max(0, Math.min(380, player.y));

    // Shooting (fixed)
    if (keys[" "] && shootCooldown <= 0) {
        shoot();
        shootCooldown = 15;
    }
    shootCooldown--;

    // Move enemies
    enemies.forEach(e => e.y += e.speed);

    // Move bullets
    bullets.forEach(b => b.y -= b.speed);

    // Cleanup
    enemies = enemies.filter(e => e.y < 420);
    bullets = bullets.filter(b => b.y > -10);

    // Bullet collision
    enemies.forEach((e, ei) => {
        bullets.forEach((b, bi) => {
            if (
                b.x < e.x + 20 &&
                b.x + 4 > e.x &&
                b.y < e.y + 20 &&
                b.y + 10 > e.y
            ) {
                enemies.splice(ei, 1);
                bullets.splice(bi, 1);
                score += 50;
            }
        });
    });

    // Player collision
    enemies.forEach(e => {
        if (
            player.x < e.x + 20 &&
            player.x + 20 > e.x &&
            player.y < e.y + 20 &&
            player.y + 20 > e.y
        ) {
            gameOver();
        }
    });

    score++;
    document.getElementById("score").textContent = score;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawPlayer(player.x, player.y);

    enemies.forEach(e => drawEnemy(e.x, e.y));

    ctx.fillStyle = "#ffff00";
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 10));
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
        document.getElementById("highscore").textContent = highScore;
    }
    alert("Game Over! Score: " + score);
    restartGame();
}

function restartGame() {
    player.x = 180;
    player.y = 320;
    enemies = [];
    bullets = [];
    score = 0;
}

// Spawn loop
setInterval(spawnEnemy, 700);

// Start
gameLoop();

</script>

</body>
